<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pannello di Controllo - Noel Aveta Studio</title>
    <!-- Google Fonts per l'interfaccia Admin -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- CSS Personalizzato per nascondere tecnicismi e migliorare UI -->
    <link rel="stylesheet" href="/admin/admin.css">
    <!-- Include the identity widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- React scripts needed for Custom Preview Templates -->
    <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
    
    <!-- Decap CMS main script -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <script>
      // 0. Carica i font di Google direttamente nell'anteprima (IMPORTANTE per la tipografia editoriale)
      CMS.registerPreviewStyle("https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Oswald:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap");
    </script>
    
    <!-- Custom Preview Template -->
    <script src="/admin/preview.js"></script>

    <!-- Fix mobile layout: rimuove gli stili inline del split pane -->
    <script>
      if (window.innerWidth <= 768) {
        var style = document.createElement('style');
        style.innerHTML = [
          '* { box-sizing: border-box !important; }',
          '.Pane, .Pane1, .Pane2, [class*="Pane"] {',
          '  width: 100% !important; min-width: 0 !important;',
          '  max-width: 100vw !important; position: static !important;',
          '  transform: none !important; left: auto !important;',
          '}',
          '.Resizer, [class*="Resizer"] { display: none !important; }',
          '[class*="SplitPane"], [class*="splitPane"] {',
          '  flex-direction: column !important;',
          '  width: 100% !important;',
          '}',
        ].join('\n');
        document.head.appendChild(style);

        // Osserva il DOM e corregge gli stili inline non appena vengono aggiunti
        var observer = new MutationObserver(function(mutations) {
          document.querySelectorAll('.Pane1, .Pane2').forEach(function(el) {
            el.style.removeProperty('width');
            el.style.removeProperty('left');
            el.style.removeProperty('right');
            el.style.removeProperty('position');
            el.style.width = '100%';
            el.style.position = 'static';
          });
          // Nascondi il secondo pannello (anteprima)
          var pane2 = document.querySelector('.Pane2');
          if (pane2) pane2.style.display = 'none';
        });
        observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['style'] });
      }
    </script>
  </body>
</html>
